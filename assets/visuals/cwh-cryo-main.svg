        <path d="M534 356 C578 327 674 322 718 354 C666 370 594 374 534 356 Z" fill="#d7edf6" opacity="0.20"/>
        <circle cx="611" cy="333" r="20" fill="#d9edf4" opacity="0.20"/>
      </g>

      <path d="M259 427 C437 452 777 451 1015 410" fill="none" stroke="#83eaff" stroke-width="6" opacity="0.88" filter="url(#softGlow)"/>
      <path d="M250 397 C436 419 808 417 1054 377" fill="none" stroke="#d9f9ff" stroke-width="2" opacity="0.65"/>
      <path d="M211 464 C414 508 807 505 1029 441" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.24"/>

