    <circle cx="914" cy="296" r="94" fill="none" stroke="#69d7ff" stroke-width="2" opacity="0.34"/>
    <path d="M742 296 H1086" stroke="#69d7ff" stroke-width="2" opacity="0.38"/>
    <path d="M914 124 V468" stroke="#69d7ff" stroke-width="2" opacity="0.22"/>
  </g>

  <g opacity="0.70">
