        <path d="M-14 -41 H218 C240 -41 252 -28 246 -8 L232 39 C228 54 216 62 198 62 H-18 C-42 62 -54 48 -47 28 L-31 -24 C-27 -35 -22 -41 -14 -41 Z" fill="#16283a" stroke="#9bdff2" stroke-width="2.5" opacity="0.98"/>
        <path d="M-1 -28 H204 C221 -28 229 -19 225 -4 L215 31 C212 43 203 49 188 49 H0 C-19 49 -27 38 -22 22 L-10 -17 C-7 -24 -5 -28 -1 -28 Z" fill="#081827" stroke="#2ecfff" stroke-width="1.5" opacity="0.86"/>
        <text x="103" y="22" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900" letter-spacing="7" fill="url(#mark)" stroke="#072236" stroke-width="1.2" paint-order="stroke fill" filter="url(#softGlow)">CWH</text>
        <path d="M-2 42 H190" stroke="#69d7ff" stroke-width="3" opacity="0.55"/>
      </g>

      <g opacity="0.92">
        <circle cx="320" cy="421" r="9" fill="#86edff" filter="url(#softGlow)"/>
        <circle cx="358" cy="427" r="5" fill="#d8fbff"/>
        <circle cx="998" cy="362" r="8" fill="#86edff" filter="url(#softGlow)"/>
