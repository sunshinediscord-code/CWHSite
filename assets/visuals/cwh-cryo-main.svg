  <path d="M226 653 C520 608 748 608 1034 648" fill="none" stroke="#69d7ff" stroke-width="2" opacity="0.10"/>

  <g filter="url(#deepShadow)">
    <ellipse cx="626" cy="516" rx="466" ry="50" fill="#00050d" opacity="0.46"/>

    <g transform="rotate(-4 640 400)">
      <path d="M172 443 C240 316 374 252 585 234 C761 219 968 257 1081 338 C1131 373 1118 430 1052 459 C902 525 528 535 281 496 C211 485 148 491 172 443 Z" fill="url(#metal)"/>
      <path d="M198 438 C257 341 386 291 582 276 C748 264 925 292 1031 353 C1067 374 1055 409 1007 424 C860 472 533 480 303 452 C240 444 180 466 198 438 Z" fill="url(#podDark)" opacity="0.96"/>

      <path d="M407 284 C503 235 690 232 814 267 C874 284 912 317 926 358 C838 384 633 388 469 371 C419 366 385 348 370 323 C361 308 374 295 407 284 Z" fill="url(#glass)" stroke="#a7edff" stroke-width="4" opacity="0.96"/>
      <path d="M426 296 C522 256 690 254 795 282" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.38" stroke-linecap="round"/>
      <path d="M441 348 C566 372 742 371 892 347" fill="none" stroke="#69d7ff" stroke-width="3" opacity="0.34"/>

      <g opacity="0.70">
