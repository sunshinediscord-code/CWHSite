<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CWH cryonics capsule main visual</title>
  <desc id="desc">A sharp futuristic cryonics capsule visual with the CWH mark integrated into the capsule body as a glowing structural element.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020815"/>
      <stop offset="0.44" stop-color="#071a2f"/>
      <stop offset="1" stop-color="#0c3357"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="60%" cy="38%" r="58%">
      <stop offset="0" stop-color="#8de9ff" stop-opacity="0.42"/>
      <stop offset="0.36" stop-color="#2fbbff" stop-opacity="0.17"/>
      <stop offset="1" stop-color="#07111f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#07101e"/>
      <stop offset="0.5" stop-color="#0b2845"/>
      <stop offset="1" stop-color="#04101f"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7ff"/>
      <stop offset="0.18" stop-color="#9fb1bf"/>
      <stop offset="0.48" stop-color="#405063"/>
      <stop offset="0.72" stop-color="#c8d8e4"/>
      <stop offset="1" stop-color="#5c7082"/>
    </linearGradient>
    <linearGradient id="podDark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#111d2b"/>
      <stop offset="0.5" stop-color="#25364a"/>
      <stop offset="1" stop-color="#101a27"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7fbff" stop-opacity="0.82"/>
      <stop offset="0.34" stop-color="#58d5ff" stop-opacity="0.40"/>
      <stop offset="0.68" stop-color="#115581" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#06142a" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ecfbff"/>
      <stop offset="0.5" stop-color="#78e4ff"/>
      <stop offset="1" stop-color="#d6f8ff"/>
    </linearGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.19 0 0 0 0 0.78 0 0 0 0 1 0 0 0 0.85 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="deepShadow" x="-20%" y="-40%" width="150%" height="190%">
      <feDropShadow dx="0" dy="34" stdDeviation="24" flood-color="#000814" flood-opacity="0.58"/>
    </filter>
    <clipPath id="podClip">
      <path d="M196 442 C256 320 387 256 594 242 C766 230 962 266 1074 343 C1123 377 1111 433 1048 459 C912 515 544 523 290 487 C218 477 171 493 196 442 Z"/>
    </clipPath>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#cyanGlow)"/>

  <g opacity="0.22">
    <path d="M0 118 H1280 M0 210 H1280 M0 302 H1280 M0 394 H1280 M0 486 H1280" stroke="#69d7ff" stroke-width="1"/>
